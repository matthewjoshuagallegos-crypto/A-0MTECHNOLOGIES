<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A#0M Captive Portal - Sovereign Authority</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #050505; 
            color: #dcdcdc; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            height: 100vh; 
            overflow: hidden; 
        }
        #main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { 
            width: 320px; 
            background: #0a0a0a; 
            border-right: 1px solid #1a1a1a; 
            overflow-y: auto; 
            padding: 24px; 
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
        }
        #content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        #header { 
            background: #000; 
            padding: 16px 24px; 
            border-bottom: 1px solid #1a1a1a; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            color: #fff; 
            font-weight: 900; 
            text-transform: uppercase;
            letter-spacing: 0.3em;
            font-size: 9px;
        }
        #editor-container {
            flex: 1;
            position: relative;
            overflow: hidden;
        }
        #editor { 
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent; 
            color: transparent; 
            caret-color: #D4AF37;
            padding: 32px; 
            overflow: auto; 
            white-space: pre; 
            font-size: 13px; 
            outline: none; 
            border: none; 
            resize: none; 
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.7;
            z-index: 2;
        }
        #highlighting {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 32px;
            margin: 0;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1.7;
            pointer-events: none;
            z-index: 1;
            overflow: auto;
            white-space: pre;
        }
        #save-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #D4AF37;
            color: #000;
            border: none;
            padding: 8px 16px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10;
            border-radius: 4px;
            display: none;
        }
        #save-btn:hover { background: #fff; }
        #terminal-container { 
            height: 35%; 
            background: #000; 
            border-top: 1px solid #1a1a1a; 
            display: flex; 
            flex-direction: column; 
        }
        #terminal-output { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            color: #dcdcdc; 
            font-size: 12px; 
            white-space: pre-wrap; 
            font-family: 'JetBrains Mono', monospace;
        }
        #terminal-input-wrapper { 
            display: flex; 
            border-top: 1px solid #1a1a1a; 
            padding: 12px 20px; 
            background: #050505; 
            align-items: center;
        }
        #terminal-prompt { color: #D4AF37; margin-right: 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: bold; }
        #terminal-input { 
            flex: 1; 
            background: transparent; 
            border: none; 
            color: #fff; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: 12px; 
            outline: none; 
        }
        .folder { cursor: pointer; color: #D4AF37; font-weight: bold; margin-top: 10px; display: flex; align-items: center; gap: 10px; transition: all 0.2s; }
        .file { cursor: pointer; color: #888; margin-left: 24px; margin-top: 6px; font-size: 11px; transition: all 0.2s; }
        .file:hover, .folder:hover { color: #fff; transform: translateX(4px); }
        .hidden { display: none; }
        .children { margin-left: 12px; border-left: 1px solid #1a1a1a; padding-left: 12px; }
        .error { color: #ff4444; }
        .log-link { color: #D4AF37; text-decoration: underline; cursor: pointer; font-size: 10px; margin-left: 10px; }
        
        h3 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.4em; color: #444; margin-bottom: 24px; font-weight: 900; }
        
        .accent-text { color: #D4AF37; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
    </style>
</head>
<body>
    <div id="header">
        <span>A#0M CAPTIVE PORTAL // SOVEREIGN AUTHORITY</span>
        <span id="current-file" style="color: #ffcc00">NO FILE SELECTED</span>
    </div>
    <div id="main">
        <div id="sidebar">
            <h3>Directory Structure</h3>
            <div id="file-tree">Initializing...</div>
        </div>
        <div id="content">
            <button id="save-btn">Save Changes</button>
            <div id="editor-container">
                <textarea id="editor" spellcheck="false"></textarea>
                <pre id="highlighting" aria-hidden="true"><code id="highlighting-content" class="language-javascript"></code></pre>
            </div>
        </div>
    </div>
    <div id="terminal-container">
        <div id="terminal-output">Welcome to A#0M Captive Portal Shell v2026.4
Authorized Access Only. 512-Bit Encryption Active.
Type 'help' for available commands.
</div>
        <div id="terminal-input-wrapper">
            <span id="terminal-prompt">sovereign@a0m:_</span>
            <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-typescript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-json.min.js"></script>

    <script>
        let currentPath = '';
        const editor = document.getElementById('editor');
        const highlightingContent = document.getElementById('highlighting-content');
        const highlighting = document.getElementById('highlighting');
        const saveBtn = document.getElementById('save-btn');

        async function loadTree() {
            try {
                const res = await fetch('/api/explorer/tree');
                const tree = await res.json();
                const treeContainer = document.getElementById('file-tree');
                treeContainer.innerHTML = '';
                treeContainer.appendChild(buildNode(tree));
            } catch (err) {
                document.getElementById('file-tree').innerHTML = '<span class="error">Failed to load tree</span>';
            }
        }

        function buildNode(node) {
            const div = document.createElement('div');
            if (node.type === 'directory') {
                const title = document.createElement('div');
                title.className = 'folder';
                title.textContent = '📁 ' + node.name;
                
                const childrenDiv = document.createElement('div');
                childrenDiv.className = 'children hidden';
                
                if (node.children) {
                    node.children.forEach(child => {
                        childrenDiv.appendChild(buildNode(child));
                    });
                }

                title.onclick = (e) => {
                    e.stopPropagation();
                    childrenDiv.classList.toggle('hidden');
                    title.textContent = childrenDiv.classList.contains('hidden') ? '📁 ' + node.name : '📂 ' + node.name;
                };

                div.appendChild(title);
                div.appendChild(childrenDiv);
            } else {
                const title = document.createElement('div');
                title.className = 'file';
                title.textContent = '📄 ' + node.name;
                title.onclick = (e) => {
                    e.stopPropagation();
                    loadFile(node.path);
                };
                div.appendChild(title);
            }
            return div;
        }

        async function loadFile(path) {
            currentPath = path;
            document.getElementById('current-file').textContent = path.toUpperCase();
            editor.value = 'LOADING SECURE ASSET...';
            updateHighlighting();
            saveBtn.style.display = 'none';
            
            try {
                const res = await fetch('/api/explorer/file?path=' + encodeURIComponent(path));
                const data = await res.text();
                editor.value = data;
                
                // Determine language
                const ext = path.split('.').pop();
                let lang = 'javascript';
                if (ext === 'ts' || ext === 'tsx') lang = 'typescript';
                if (ext === 'css') lang = 'css';
                if (ext === 'json') lang = 'json';
                
                highlightingContent.className = 'language-' + lang;
                updateHighlighting();
                saveBtn.style.display = 'block';
            } catch (err) {
                editor.value = 'ERROR LOADING FILE: ' + err.message;
                updateHighlighting();
            }
        }

        function updateHighlighting() {
            let text = editor.value;
            if (text[text.length - 1] === "\n") {
                text += " ";
            }
            highlightingContent.textContent = text;
            Prism.highlightElement(highlightingContent);
        }

        editor.oninput = () => {
            updateHighlighting();
        };

        editor.onscroll = () => {
            highlighting.scrollTop = editor.scrollTop;
            highlighting.scrollLeft = editor.scrollLeft;
        };

        saveBtn.onclick = async () => {
            if (!currentPath) return;
            saveBtn.textContent = 'SAVING...';
            saveBtn.disabled = true;
            try {
                const res = await fetch('/api/explorer/file', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: currentPath, content: editor.value })
                });
                const data = await res.json();
                if (data.success) {
                    saveBtn.textContent = 'SAVED';
                    setTimeout(() => {
                        saveBtn.textContent = 'Save Changes';
                        saveBtn.disabled = false;
                    }, 2000);
                } else {
                    throw new Error(data.error);
                }
            } catch (err) {
                alert('FAILED TO SAVE: ' + err.message);
                saveBtn.textContent = 'RETRY SAVE';
                saveBtn.disabled = false;
            }
        };

        loadTree();

        // Terminal Logic
        const termInput = document.getElementById('terminal-input');
        const termOutput = document.getElementById('terminal-output');
        
        termInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const cmd = termInput.value.trim();
                if (!cmd) return;
                termInput.value = '';
                
                termOutput.innerHTML += `\n<span style="color:#ffcc00">sovereign@a0m:_</span> ${escapeHtml(cmd)}\n`;
                termOutput.scrollTop = termOutput.scrollHeight;

                if (cmd === 'clear') {
                    termOutput.innerHTML = 'Terminal cleared.\n';
                    return;
                }

                if (cmd === 'help') {
                    termOutput.innerHTML += 'Available commands: ls, cat, help, clear, whoami, date, pwd, echo, grep, find\n';
                    termOutput.scrollTop = termOutput.scrollHeight;
                    return;
                }
                
                try {
                    const res = await fetch('/api/explorer/shell', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ command: cmd })
                    });
                    const data = await res.json();
                    
                    if (data.stdout) {
                        termOutput.innerHTML += escapeHtml(data.stdout);
                    }
                    if (data.stderr) {
                        termOutput.innerHTML += `<span class="error">${escapeHtml(data.stderr)}</span>`;
                    }
                    if (data.error) {
                        termOutput.innerHTML += `<span class="error">EXECUTION ERROR: ${escapeHtml(data.error)}</span>`;
                    }
                    if (data.logId) {
                        const logLink = document.createElement('a');
                        logLink.className = 'log-link';
                        logLink.textContent = '[DOWNLOAD DEBUG LOG]';
                        logLink.href = `/api/explorer/shell/log/${data.logId}`;
                        termOutput.appendChild(logLink);
                        termOutput.innerHTML += '\n';
                    }
                    if (!data.stdout && !data.stderr && !data.error) {
                        termOutput.innerHTML += 'Command executed with no output.\n';
                    }
                } catch (err) {
                    termOutput.innerHTML += `<span class="error">NETWORK ERROR: ${err.message}</span>\n`;
                }
                termOutput.scrollTop = termOutput.scrollHeight;
            }
        });

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
